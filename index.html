<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fecha.</title>
    <link rel="shortcut icon" href="Reloj.png" type="image/png" />
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <section class="fecha-general superior">
      <section class="hora-general">
        <h1 class="f-superior"></h1>
        <h1 class="d-superior"></h1>
        <h1 class="h-superior"></h1>
      </section>
    </section>
    <section class="fecha-general centro">
      <section class="caja-hora-general">
        <section class="contenedor">
          <section class="envoltorio-reproductor">
            <section class="visor-numeros"></section>
            <section class="visor-canciones">
              <section class="columna-canciones"></section>
            </section>
          </section>
          <input
            name="entrada"
            type="number"
            class="entrada-numero"
            value="13"
            min="1"
            max="13"
          />
          <br />
          <button class="boton-inicio">Iniciar Conteo Clancy</button>
        </section>
        <section class="caja-contador">
          <h1 class="contador"></h1>
          <h1 class="contador contador-estatico">88</h1>
        </section>
        <section class="hora-general-secundaria">
          <h1 class="f-centro"></h1>
          <h1 class="d-centro"></h1>
          <h1 class="h-centro"></h1>
        </section>
        <section>
          <h1 class="fecha-completa"></h1>
        </section>
      </section>
    </section>
    <section class="fecha-general inferior">
      <section class="hora-general">
        <h1 class="f-inferior"></h1>
        <h1 class="d-inferior"></h1>
        <h1 class="h-inferior"></h1>
      </section>
    </section>
    <script type="text/javascript" src="script.js"></script>
  </body>
</html>
